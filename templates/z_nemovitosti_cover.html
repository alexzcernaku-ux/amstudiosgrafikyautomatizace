<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1350px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .slide { width:1080px; height:1350px; position:relative; overflow:hidden; background:#002E4D; }

  /* Fotka přes celou šířku, výška v přesném poměru 3:2 (1080x720) — přesně tak,
     jak fotky reálně jsou, takže se nic neořezává ani nezvětšuje. Uvnitř fotky
     je gradient dole, co ji měkce propojí s navy pozadím (stejný efekt jako
     dřív u full-bleed verze), místo tvrdého okraje rámečku. */
  .photo-wrap { position:absolute; top:0; left:0; width:1080px; height:720px; overflow:hidden; }
  .photo-wrap img { width:100%; height:100%; object-fit:cover; }
  .fade { position:absolute; left:0; bottom:0; width:1080px; height:140px;
    background:linear-gradient(to bottom, rgba(0,46,77,0) 0%, rgba(0,46,77,.8) 60%, #002E4D 100%); }

  .badge-row { position:absolute; top:750px; left:78px; right:70px; display:flex; flex-wrap:wrap; gap:14px; }
  .badge { background:#ffffff; color:#002E4D; font-size:32px; font-weight:700; padding:11px 24px; border-radius:10px; max-width:100%; }

  .headline { position:absolute; top:926px; left:80px; font-size:56px; font-weight:700; color:#ffffff; line-height:1.2; max-width:920px; }

  .makler { position:absolute; top:1080px; left:82px; font-size:28px; color:#c3d2da; font-weight:500; }
  .makler b { color:#ffffff; font-weight:700; }

  .footer { position:absolute; bottom:60px; left:82px; right:70px; display:flex; align-items:center; justify-content:space-between; }
  .page-ind { font-size:20px; color:#ffffff; opacity:.6; font-weight:600; }
  .swipe { font-size:20px; color:#ffffff; opacity:.85; font-weight:600; }
</style>
</head>
<body>
<div class="slide">
  <div class="photo-wrap">
    <img src="assets/{{ photo_filename }}">
    <div class="fade"></div>
  </div>
  <div class="badge-row">
    {% if nadpis_nemovitosti %}<div class="badge">{{ nadpis_nemovitosti }}</div>{% endif %}
    {% if dispozice %}<div class="badge">{{ dispozice }}</div>{% endif %}
  </div>
  <div class="headline">{{ lokalita }}</div>
  {% if makler_jmeno %}<div class="makler">Makléř: <b>{{ makler_jmeno }}</b>{% if makler_agentura %} &middot; {{ makler_agentura }}{% endif %}</div>{% endif %}
  <div class="footer">
    <div class="page-ind">{{ slide_number }}/{{ total_slides }}</div>
    <div class="swipe">Swipe &#8594;</div>
  </div>
</div>
</body>
</html>
