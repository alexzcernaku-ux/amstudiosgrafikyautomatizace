<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1350px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .slide { width:1080px; height:1350px; position:relative; overflow:hidden; background:#002E4D; }
  .photo { position:absolute; top:0; left:0; width:1080px; height:1350px; object-fit:cover; }

  .gradient { position:absolute; left:0; bottom:0; width:1080px; height:650px;
    background:linear-gradient(to bottom, rgba(0,46,77,0) 0%, rgba(0,46,77,.6) 40%, rgba(0,46,77,.97) 75%, #002E4D 100%); }

  .disp-badge { position:absolute; top:80px; left:70px; background:#ffffff; color:#002E4D; font-size:36px; font-weight:700; padding:13px 28px; border-radius:10px; }

  .headline { position:absolute; bottom:200px; left:74px; font-size:60px; font-weight:700; color:#ffffff; line-height:1.1; max-width:920px; }

  .makler { position:absolute; bottom:140px; left:78px; font-size:28px; color:#c3d2da; font-weight:500; }
  .makler b { color:#ffffff; font-weight:700; }

  .footer { position:absolute; bottom:60px; left:78px; right:70px; display:flex; align-items:center; justify-content:space-between; }
  .page-ind { font-size:20px; color:#ffffff; opacity:.6; font-weight:600; }
  .swipe { font-size:20px; color:#ffffff; opacity:.85; font-weight:600; }
</style>
</head>
<body>
<div class="slide">
  <img class="photo" src="assets/{{ photo_filename }}">
  <div class="gradient"></div>
  <div class="disp-badge">{{ dispozice }}</div>
  <div class="headline">{{ lokalita }}</div>
  <div class="makler">Makléř: <b>{{ makler_jmeno }}</b>{% if makler_agentura %} &middot; {{ makler_agentura }}{% endif %}</div>
  <div class="footer">
    <div class="page-ind">1/6</div>
    <div class="swipe">Swipe &#8594;</div>
  </div>
</div>
</body>
</html>
