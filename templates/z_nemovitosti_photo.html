<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1350px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .slide { width:1080px; height:1350px; position:relative; overflow:hidden;
    background-color:#002E4D; background-image:url('assets/texture_ad.png');
    background-size:cover; background-position:left center; }

  .photo-frame { position:absolute; top:360px; left:80px; width:920px; height:613px;
    border-radius:16px; overflow:hidden; box-shadow:0 30px 60px rgba(0,0,0,.35); }
  .photo-frame img { width:100%; height:100%; object-fit:cover; }

  .page-ind { position:absolute; top:70px; right:80px; font-size:20px; color:#ffffff; opacity:.75; font-weight:600; }

  .caption { position:absolute; top:1013px; left:82px; right:82px; font-size:28px; font-weight:600; color:#ffffff; text-align:center; }

  .footer { position:absolute; bottom:60px; left:78px; right:80px; display:flex; align-items:center; justify-content:flex-end; }
  .swipe { font-size:20px; color:#ffffff; opacity:.85; font-weight:600; }
</style>
</head>
<body>
<div class="slide">
  <div class="photo-frame"><img src="assets/{{ photo_filename }}"></div>
  <div class="page-ind">{{ slide_number }}/{{ total_slides }}</div>
  {% if caption %}<div class="caption">{{ caption }}</div>{% endif %}
  <div class="footer">
    <div class="swipe">Swipe &#8594;</div>
  </div>
</div>
</body>
</html>
