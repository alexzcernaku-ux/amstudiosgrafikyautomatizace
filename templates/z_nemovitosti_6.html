<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1350px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .slide { width:1080px; height:1350px; position:relative; overflow:hidden;
    background-color:#002E4D; background-image:url('assets/texture_ad.png');
    background-size:cover; background-position:right center;
    display:flex; flex-direction:column; align-items:center; justify-content:center; }

  .logo-inline { height:34px; }

  .cred-block { display:flex; flex-direction:column; align-items:flex-start; }
  .cred-row { display:flex; align-items:center; gap:28px; margin-bottom:22px; }
  .cred-row:last-child { margin-bottom:0; }
  .cred-label { font-size:24px; color:#8fa8b8; text-transform:uppercase; letter-spacing:1px; min-width:160px; }
  .cred-name { font-size:34px; color:#ffffff; font-weight:700; white-space:nowrap; }

  .divider { width:80px; height:4px; background:#335871; margin:40px 0; }

  .view-text { font-size:26px; color:#dbe5ea; text-align:center; max-width:640px; line-height:1.5; margin-bottom:26px; }
  .view-text b { color:#ffffff; }

  .platforms { display:flex; gap:20px; }
  .platform-tag { background:rgba(255,255,255,.1); color:#ffffff; font-size:24px; font-weight:600; padding:14px 30px; border-radius:30px; }
</style>
</head>
<body>
<div class="slide">
  <div class="cred-block">
    <div class="cred-row"><span class="cred-label">Prezentace</span><img class="logo-inline" src="assets/logo_white.png"></div>
    <div class="cred-row"><span class="cred-label">Makléř</span><span class="cred-name">{{ makler_jmeno }}</span></div>
  </div>

  <div class="divider"></div>

  <div class="view-text">Celou nemovitost si můžete prohlédnout na <b>YouTube</b> a <b>Sreality</b></div>

  <div class="platforms">
    <div class="platform-tag">YouTube</div>
    <div class="platform-tag">Sreality</div>
  </div>
</div>
</body>
</html>
