<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1920px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .thumb { width:1080px; height:1920px; position:relative; overflow:hidden; background:#002E4D; }
  .photo { position:absolute; top:0; left:0; width:1080px; height:1920px; object-fit:cover; }

  .gradient { position:absolute; left:0; bottom:0; width:1080px; height:950px;
    background:linear-gradient(to bottom, rgba(0,46,77,0) 0%, rgba(0,46,77,.55) 38%, rgba(0,46,77,.96) 72%, #002E4D 100%); }

  .disp-badge { position:absolute; top:90px; left:70px; background:#ffffff; color:#002E4D; font-size:36px; font-weight:700; padding:13px 28px; border-radius:10px; }

  .headline { position:absolute; top:1490px; left:74px; font-size:58px; font-weight:700; color:#ffffff; line-height:1.15; max-width:940px; }

  .makler { position:absolute; top:1660px; left:78px; font-size:28px; color:#c3d2da; font-weight:500; }
  .makler b { color:#ffffff; font-weight:700; }

  .logo { position:absolute; bottom:70px; right:64px; height:44px; }
</style>
</head>
<body>
<div class="thumb">
  <img class="photo" src="assets/{{ photo_filename }}">
  <div class="gradient"></div>
  {% if dispozice %}<div class="disp-badge">{{ dispozice }}</div>{% endif %}
  <div class="headline">{{ lokalita }}</div>
  {% if makler_jmeno %}<div class="makler">Makléř: <b>{{ makler_jmeno }}</b>{% if makler_agentura %} &middot; {{ makler_agentura }}{% endif %}</div>{% endif %}
  <img class="logo" src="assets/logo_white.png">
</div>
</body>
</html>
