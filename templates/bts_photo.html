<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1350px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .slide { width:1080px; height:1350px; position:relative; overflow:hidden; background:#002E4D; }
  .photo { position:absolute; top:0; left:0; width:1080px; height:1350px; object-fit:cover; }

  .gradient { position:absolute; left:0; bottom:0; width:1080px; height:340px;
    background:linear-gradient(to bottom, rgba(0,46,77,0) 0%, rgba(0,46,77,.9) 60%, #002E4D 100%); }

  .caption { position:absolute; bottom:120px; left:70px; right:70px; font-size:32px; font-weight:600; color:#ffffff; }

  .footer { position:absolute; bottom:50px; left:70px; right:70px; display:flex; align-items:center; justify-content:space-between; }
  .page-ind { font-size:20px; color:#ffffff; opacity:.6; font-weight:600; }
  .swipe { font-size:20px; color:#ffffff; opacity:.85; font-weight:600; }
</style>
</head>
<body>
<div class="slide">
  <img class="photo" src="assets/{{ photo_filename }}">
  <div class="gradient"></div>
  {% if caption %}<div class="caption">{{ caption }}</div>{% endif %}
  <div class="footer">
    <div class="page-ind">{{ slide_number }}/{{ total_slides }}</div>
    <div class="swipe">Swipe &#8594;</div>
  </div>
</div>
</body>
</html>
