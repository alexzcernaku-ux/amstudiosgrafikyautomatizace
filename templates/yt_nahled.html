<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1280px 720px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .thumb { width:1280px; height:720px; position:relative; overflow:hidden; background:#002E4D; }
  .photo { position:absolute; top:0; left:0; width:1280px; height:720px; object-fit:cover; }

  .gradient { position:absolute; left:0; bottom:0; width:1280px; height:400px;
    background:linear-gradient(to bottom, rgba(0,46,77,0) 0%, rgba(0,46,77,.65) 40%, rgba(0,46,77,.96) 75%, #002E4D 100%); }

  .disp-badge { position:absolute; top:48px; left:48px; background:#ffffff; color:#002E4D; font-size:40px; font-weight:700; padding:12px 26px; border-radius:10px; }

  .headline { position:absolute; bottom:150px; left:50px; font-size:64px; font-weight:700; color:#ffffff; line-height:1.1; max-width:1000px; }

  .makler { position:absolute; bottom:96px; left:54px; font-size:28px; color:#c3d2da; font-weight:500; }
  .makler b { color:#ffffff; font-weight:700; }

  .logo { position:absolute; bottom:40px; right:44px; height:38px; }
</style>
</head>
<body>
<div class="thumb">
  <img class="photo" src="assets/{{ photo_filename }}">
  <div class="gradient"></div>
  <div class="disp-badge">{{ dispozice }}</div>
  <div class="headline">{{ lokalita }}</div>
  <div class="makler">Makléř: <b>{{ makler_jmeno }}</b>{% if makler_agentura %} &middot; {{ makler_agentura }}{% endif %}</div>
  <img class="logo" src="assets/logo_white.png">
</div>
</body>
</html>
