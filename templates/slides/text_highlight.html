<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1350px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .slide { width:1080px; height:1350px; position:relative; overflow:hidden; background:#ffffff; }

  .header { position:absolute; top:70px; left:80px; right:80px; display:flex; align-items:center; justify-content:space-between; }
  .brand img { height:28px; }
  .page-ind { font-size:20px; color:#9a9a94; font-weight:600; }

  .headline { position:absolute; top:220px; left:80px; font-size:56px; font-weight:700; color:#002E4D; line-height:1.25; max-width:900px; }

  .body-text { position:absolute; top:460px; left:80px; font-size:32px; color:#333330; line-height:1.6; max-width:900px; }

  .highlight-box { position:absolute; top:760px; left:80px; width:920px; background:#EAF0F4; border-left:5px solid #335871; border-radius:0 12px 12px 0; padding:36px 40px; }
  .highlight-box p { font-size:30px; color:#002E4D; font-weight:600; line-height:1.5; }

  .footer { position:absolute; bottom:70px; left:80px; right:80px; display:flex; align-items:center; justify-content:space-between; }
  .swipe { font-size:22px; color:#9a9a94; font-weight:600; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="brand"><img src="assets/logo_navy.png"></div>
    <div class="page-ind">{{ slide_number }}/{{ total_slides }}</div>
  </div>

  <div class="headline">{{ nadpis }}</div>
  <div class="body-text">{{ text }}</div>

  {% if zvyrazneni %}
  <div class="highlight-box">
    <p>{{ zvyrazneni }}</p>
  </div>
  {% endif %}

  <div class="footer">
    <div></div>
    <div class="swipe">Swipe &#8594;</div>
  </div>
</div>
</body>
</html>
