<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1350px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .slide { width:1080px; height:1350px; position:relative; overflow:hidden;
    background-color:#002E4D; background-image:url('assets/texture_ad.png');
    background-size:cover; background-position:right center; }

  .logo { position:absolute; top:130px; left:80px; height:52px; }

  .headline { position:absolute; top:500px; left:80px; font-size:64px; font-weight:700; color:#ffffff; line-height:1.24; max-width:900px; }

  .sub { position:absolute; top:750px; left:80px; font-size:32px; color:#d7e2e8; line-height:1.5; max-width:850px; }

  .cta-box { position:absolute; bottom:150px; left:80px; right:80px; background:#ffffff; border-radius:14px; padding:34px 44px; display:flex; align-items:center; justify-content:space-between; }
  .cta-box p { font-size:34px; font-weight:700; color:#002E4D; }
  .cta-box .arrow { color:#335871; margin-left:12px; }
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="assets/logo_white.png">

  <div class="headline">{{ nadpis }}</div>
  <div class="sub">{{ text }}</div>

  <div class="cta-box">
    <p>amstudios.cz <span class="arrow">&#8594;</span></p>
  </div>
</div>
</body>
</html>
