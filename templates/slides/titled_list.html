<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1350px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .slide { width:1080px; height:1350px; position:relative; overflow:hidden; background:#002E4D; background-image:url('assets/texture_ad.png'); background-size:cover; background-position:left center; }

  .header { position:absolute; top:70px; left:80px; right:80px; display:flex; align-items:center; justify-content:space-between; }
  .brand img { height:28px; }
  .page-ind { font-size:20px; color:#ffffff; opacity:.6; font-weight:600; }

  .headline { position:absolute; top:220px; left:80px; font-size:52px; font-weight:700; color:#ffffff; line-height:1.25; max-width:920px; }

  .list { position:absolute; top:480px; left:80px; width:920px; }
  .row { display:flex; align-items:flex-start; gap:22px; margin-bottom:34px; }
  .row:last-child { margin-bottom:0; }
  .row .num { flex:0 0 46px; height:46px; border-radius:50%; background:#335871; color:#ffffff; font-size:22px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .row .txt h3 { font-size:30px; color:#ffffff; font-weight:700; margin-bottom:4px; }
  .row .txt p { font-size:22px; color:#c3d2da; line-height:1.4; }

  .footer { position:absolute; bottom:70px; left:80px; right:80px; display:flex; align-items:center; justify-content:space-between; }
  .swipe { font-size:22px; color:#ffffff; opacity:.85; font-weight:600; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="brand"><img src="assets/logo_white.png"></div>
    <div class="page-ind">{{ slide_number }}/{{ total_slides }}</div>
  </div>

  <div class="headline">{{ nadpis }}</div>

  <div class="list">
    {% for polozka in body %}
    <div class="row">
      <div class="num">{{ loop.index }}</div>
      <div class="txt"><h3>{{ polozka.title }}</h3><p>{{ polozka.text }}</p></div>
    </div>
    {% endfor %}
  </div>

  <div class="footer">
    <div></div>
    <div class="swipe">Swipe &#8594;</div>
  </div>
</div>
</body>
</html>
