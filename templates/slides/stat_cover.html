<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1350px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .slide { width:1080px; height:1350px; position:relative; overflow:hidden;
    background-color:#002E4D; background-image:url('assets/texture_ad.png');
    background-size:cover; background-position:right center; }

  .eyebrow { position:absolute; top:90px; left:80px; font-size:26px; letter-spacing:3px; color:#ffffff; opacity:.65; text-transform:uppercase; font-weight:600; }

  .stat { position:absolute; top:420px; left:80px; font-size:260px; font-weight:700; color:#ffffff; line-height:1; }

  .sub { position:absolute; top:730px; left:80px; font-size:38px; font-weight:400; color:#dbe5ea; line-height:1.5; max-width:880px; }

  .src { position:absolute; top:880px; left:80px; font-size:18px; color:#7f97a5; font-style:italic; }

  .footer { position:absolute; bottom:70px; left:80px; right:80px; display:flex; align-items:center; justify-content:space-between; }
  .page-ind { font-size:22px; color:#ffffff; opacity:.6; font-weight:600; }
  .swipe { font-size:22px; color:#ffffff; opacity:.85; font-weight:600; }
</style>
</head>
<body>
<div class="slide">
  <div class="eyebrow">{{ eyebrow }}</div>
  <div class="stat">{{ stat }}</div>
  <div class="sub">{{ stat_popis }}</div>
  {% if zdroj %}<div class="src">Zdroj: {{ zdroj }}</div>{% endif %}
  <div class="footer">
    <div class="page-ind">{{ slide_number }}/{{ total_slides }}</div>
    <div class="swipe">Swipe &#8594;</div>
  </div>
</div>
</body>
</html>
