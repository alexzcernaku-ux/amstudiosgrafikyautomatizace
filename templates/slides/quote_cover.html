<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1350px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .slide { width:1080px; height:1350px; position:relative; overflow:hidden;
    background-color:#002E4D; background-image:url('assets/texture_ad.png');
    background-size:cover; background-position:right center; }

  .eyebrow { position:absolute; top:100px; left:80px; font-size:26px; letter-spacing:3px; color:#ffffff; opacity:.65; text-transform:uppercase; font-weight:600; }

  .quote { position:absolute; top:220px; left:80px; font-size:76px; font-weight:700; color:#ffffff; line-height:1.2; max-width:900px; font-style:italic; }

  .stamp { position:absolute; top:600px; left:100px; border:9px solid #E8384F; color:#E8384F; padding:14px 38px; font-size:56px; font-weight:800; text-transform:uppercase; transform:rotate(-9deg); letter-spacing:5px; border-radius:14px; background:rgba(0,46,77,.28); }

  .footer { position:absolute; bottom:70px; left:80px; right:80px; display:flex; align-items:center; justify-content:space-between; }
  .page-ind { font-size:22px; color:#ffffff; opacity:.6; font-weight:600; }
  .swipe { font-size:22px; color:#ffffff; opacity:.85; font-weight:600; }
</style>
</head>
<body>
<div class="slide">
  <div class="eyebrow">{{ eyebrow | default("Realitní mýtus") }}</div>
  <div class="quote">&bdquo;{{ quote }}&ldquo;</div>
  <div class="stamp">{{ stamp_label | default("Mýtus") }}</div>
  <div class="footer">
    <div class="page-ind">{{ slide_number }}/{{ total_slides }}</div>
    <div class="swipe">Swipe &#8594;</div>
  </div>
</div>
</body>
</html>
