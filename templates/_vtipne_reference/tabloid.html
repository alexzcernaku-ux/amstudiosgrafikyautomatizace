<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1080px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .post { width:1080px; height:1080px; position:relative; overflow:hidden; background:#F2C310; }

  .tag { position:absolute; top:70px; left:70px; background:#000000; color:#F2C310; font-size:26px; font-weight:800; padding:10px 24px; letter-spacing:1px; transform:rotate(-3deg); }

  .headline { position:absolute; top:200px; left:70px; font-size:82px; font-weight:800; color:#000000; line-height:1.06; max-width:960px; }

  .sub { position:absolute; top:670px; left:70px; font-size:34px; font-weight:600; color:#1a1a1a; max-width:900px; line-height:1.4; background:#000000; color:#F2C310; padding:20px 28px; display:inline-block; transform:rotate(-1deg); }

  .footer { position:absolute; bottom:60px; left:70px; right:70px; display:flex; align-items:center; justify-content:center; }
  .footer img { height:30px; }
</style>
</head>
<body>
<div class="post">
  <div class="tag">ŠOKUJÍCÍ ZPRÁVY Z REALIT</div>
  <div class="headline">MAKLÉŘ VYFOTIL BYT V 23:47.</div>
  <div class="sub">Sousedi zděšeni. Prkénko nahoře. Kočka v hlavní roli.</div>

  <div class="footer">
    <img src="../assets/logo_navy.png">
  </div>
</div>
</body>
</html>
