<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1080px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .post { width:1080px; height:1080px; position:relative; overflow:hidden;
    background-color:#002E4D; background-image:url('../assets/texture_ad.png');
    background-size:cover; background-position:right center; }

  .eyebrow { position:absolute; top:80px; left:80px; font-size:24px; letter-spacing:2px; color:#8fa8b8; text-transform:uppercase; font-weight:600; }

  .headline { position:absolute; top:140px; left:80px; font-size:64px; font-weight:700; color:#ffffff; }

  .list { position:absolute; top:320px; left:80px; width:920px; }
  .row { display:flex; align-items:center; gap:22px; padding:20px 0; }
  .row .box { flex:0 0 40px; height:40px; border:3px solid #335871; border-radius:8px; }
  .row p { font-size:34px; color:#eaf0f4; font-weight:500; }

  .footer { position:absolute; bottom:70px; left:80px; right:80px; display:flex; align-items:center; gap:16px; }
  .footer img { height:28px; }
  .footer p { font-size:22px; color:#8fa8b8; }
</style>
</head>
<body>
<div class="post">
  <div class="eyebrow">Protože se to děje fakt často</div>
  <div class="headline">Realitní bingo</div>

  <div class="list">
    <div class="row"><div class="box"></div><p>Ponožky sušící se na topení</p></div>
    <div class="row"><div class="box"></div><p>Odraz fotografa v zrcadle</p></div>
    <div class="row"><div class="box"></div><p>Záchodové prkénko nahoře</p></div>
    <div class="row"><div class="box"></div><p>Kočka, co "taky bydlí v bytě"</p></div>
  </div>

  <div class="footer">
    <img src="../assets/icon_white.png">
    <p>AM Studios &middot; pro jistotu radši voláme profíka</p>
  </div>
</div>
</body>
</html>
