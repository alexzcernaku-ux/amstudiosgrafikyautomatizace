<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1350px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .slide { width:1080px; height:1350px; position:relative; overflow:hidden; background:#ffffff; display:flex; flex-direction:column; align-items:center; justify-content:center; }

  .header { position:absolute; top:70px; left:80px; right:80px; display:flex; align-items:center; justify-content:space-between; }
  .brand img { height:28px; }
  .page-ind { font-size:20px; color:#9a9a94; font-weight:600; }

  .eyebrow { font-size:26px; letter-spacing:2px; color:#9a9a94; text-transform:uppercase; font-weight:600; margin-bottom:24px; }
  .name { font-size:74px; font-weight:700; color:#002E4D; text-align:center; line-height:1.2; max-width:880px; }
  .role { font-size:30px; color:#5f5e5a; margin-top:20px; }

  .divider { width:100px; height:5px; background:#335871; margin:44px 0; }

  .quote { font-size:28px; color:#333330; text-align:center; max-width:760px; line-height:1.6; font-style:italic; }

  .footer { position:absolute; bottom:70px; left:80px; right:80px; display:flex; align-items:center; justify-content:space-between; }
  .swipe { font-size:22px; color:#9a9a94; font-weight:600; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="brand"><img src="assets/logo_navy.png"></div>
    <div class="page-ind">4/6</div>
  </div>

  <div class="eyebrow">Prezentaci vedl makléř</div>
  <div class="name">{{ makler_jmeno }}</div>
  <div class="role">Nemovitost{% if lokalita %} v {{ lokalita }}{% endif %}</div>

  <div class="divider"></div>

  <div class="quote">Vizuální prezentace, která pomohla nemovitosti vyniknout na trhu.</div>

  <div class="footer">
    <div></div>
    <div class="swipe">Swipe &#8594;</div>
  </div>
</div>
</body>
</html>
