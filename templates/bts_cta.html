<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 1080px 1350px; margin: 0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',sans-serif; }

  .slide { width:1080px; height:1350px; position:relative; overflow:hidden;
    background-color:#002E4D; background-image:url('assets/texture_ad.png');
    background-size:cover; background-position:right center;
    display:flex; flex-direction:column; align-items:center; justify-content:center; }

  .logo { height:64px; margin-bottom:50px; }
  .headline { font-size:44px; font-weight:700; color:#ffffff; text-align:center; max-width:800px; line-height:1.3; }
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="assets/logo_white.png">
  <div class="headline">Chcete podobný výsledek u vaší nemovitosti?</div>
</div>
</body>
</html>
